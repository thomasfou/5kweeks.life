<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@800&display=swap" rel="stylesheet" />
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  html,body{width:512px; height:512px; overflow:hidden;}
  .icon{position:relative; width:512px; height:512px; border-radius:120px;
    background:
      radial-gradient(420px 360px at 25% 12%, rgba(59,130,246,.55), transparent 70%),
      linear-gradient(135deg,#0c0c14,#050507);
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 0 0 12px rgba(255,255,255,.06);}
  .txt{font-family:"Hanken Grotesk", sans-serif; font-weight:800; font-size:280px; letter-spacing:-12px; line-height:1; transform:translateY(-6px);}
  .txt .b{color:#f4f4f5;}
  .txt .k{color:#60a5fa;}
  .dot{position:absolute; top:96px; right:104px; width:26px; height:26px; border-radius:50%; background:#39ff14; box-shadow:0 0 22px #39ff14;}
</style>
</head>
<body>
  <div class="icon">
    <span class="txt"><span class="b">5</span><span class="k">k</span></span>
    <span class="dot"></span>
  </div>
</body>
</html>
